<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>This Way &amp; That Travel, LLC | The Immersive Group</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />

<style>
/* ═══════════════════════════════════════
RESET & BASE
═══════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
--gold: #f0c040;
--gold-dk: #d4a017;
--navy: #0b1a2b;
--navy-lt: #132d46;
--teal: #1a6e7a;
--white: #ffffff;
--glass: rgba(255,255,255,.07);
--radius: 12px;
--shadow: 0 8px 32px rgba(0,0,0,.35);
}

html { scroll-behavior: smooth; }

body {
font-family: 'Poppins', sans-serif;
background: linear-gradient(160deg, var(--navy), #203a43, #2c5364);
color: var(--white);
line-height: 1.6;
}

h1, h2, h3 { font-family: 'Playfair Display', serif; }

a { color: var(--gold); text-decoration: none; transition: color .3s; }
a:hover { color: #fff; }

img { max-width: 100%; display: block; }

section { padding: 80px 20px; }

.container {
max-width: 1100px;
margin: 0 auto;
}

.section-heading {
text-align: center;
font-size: 2.2rem;
color: var(--gold);
margin-bottom: 12px;
}

.section-sub {
text-align: center;
font-size: 1.05rem;
color: #b0bec5;
margin-bottom: 48px;
}

/* ═══════════════════════════════════════
NAV
═══════════════════════════════════════ */
nav {
position: fixed; top:0; left:0; width:100%; z-index:1000;
background: rgba(11,26,43,.92);
backdrop-filter: blur(10px);
display: flex; align-items: center; justify-content: space-between;
padding: 14px 40px;
box-shadow: 0 2px 20px rgba(0,0,0,.4);
}
nav .logo {
font-family: 'Playfair Display', serif;
font-size: 1.35rem;
color: var(--gold);
}
nav .logo span {
color: var(--white); font-weight:300;
font-family:'Poppins',sans-serif; font-size:.8rem;
display:block; margin-top:-2px; opacity:.7;
}
nav ul { list-style:none; display:flex; gap:28px; }
nav ul li a { font-weight:600; font-size:.95rem; color:#ccc; }
